  #       run: npx playwright install --with-deps
  #       working-directory: examples/svelte/orbitdb-replication
  #
  #     - name: Run E2E tests - orbitdb-replication
  #       env:
  #         PORT: 5174
  #       run: npx playwright test
  #       working-directory: examples/svelte/orbitdb-replication
