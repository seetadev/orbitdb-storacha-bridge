name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    environment: STORACHA_KEY
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file for tests
        run: |
          echo "STORACHA_KEY=${{ secrets.STORACHA_KEY }}" >> .env
          echo "STORACHA_PROOF=${{ secrets.STORACHA_PROOF }}" >> .env

      - name: Clear Storacha space before tests
        run: npm run clear-space

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_OPTIONS: '--experimental-vm-modules --no-warnings'
          DEBUG: 'libp2p:*'

      - name: Clean up test artifacts
        if: always()
        run: npm run clean

  car-backup-tests:
    name: CAR Backup Tests
    runs-on: ubuntu-latest
    environment: STORACHA_KEY
    needs: [integration-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file for tests
        run: |
          echo "STORACHA_KEY=${{ secrets.STORACHA_KEY }}" >> .env
          echo "STORACHA_PROOF=${{ secrets.STORACHA_PROOF }}" >> .env

      - name: Clear Storacha space before tests
        run: npm run clear-space

      - name: Run CAR backup tests
        run: npm run test:car-backup
        env:
          NODE_OPTIONS: '--experimental-vm-modules --no-warnings'
          DEBUG: 'libp2p:*'

      - name: Clean up test artifacts
        if: always()
        run: npm run clean

  p256-ucan-tests:
    name: P256 UCAN Security Tests
    runs-on: ubuntu-latest
    environment: STORACHA_KEY
    needs: [car-backup-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file for tests
        run: |
          echo "STORACHA_KEY=${{ secrets.STORACHA_KEY }}" >> .env
          echo "STORACHA_PROOF=${{ secrets.STORACHA_PROOF }}" >> .env

      - name: Run P256 UCAN tests
        run: npm run test:p256-ucan
        env:
          NODE_OPTIONS: '--experimental-vm-modules --no-warnings'
          DEBUG: 'libp2p:*'

      - name: Clean up test artifacts
        if: always()
        run: npm run clean
  timestamped-backup-tests:
    name: Timestamped Backup Tests
    runs-on: ubuntu-latest
    environment: STORACHA_KEY
    needs: [p256-ucan-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file for tests
        run: |
          echo "STORACHA_KEY=${{ secrets.STORACHA_KEY }}" >> .env
          echo "STORACHA_PROOF=${{ secrets.STORACHA_PROOF }}" >> .env

      - name: Clear Storacha space before tests
        run: npm run clear-space

      - name: Run timestamped backup tests
        run: npm run test:timestamped-backup
        env:
          NODE_OPTIONS: '--experimental-vm-modules --no-warnings'
          DEBUG: 'libp2p:*'

      - name: Clean up test artifacts
        if: always()
        run: npm run clean

  network-download-tests:
    name: Network Download Tests
    runs-on: ubuntu-latest
    environment: STORACHA_KEY
    needs: [timestamped-backup-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file for tests
        run: |
          echo "STORACHA_KEY=${{ secrets.STORACHA_KEY }}" >> .env
          echo "STORACHA_PROOF=${{ secrets.STORACHA_PROOF }}" >> .env

      - name: Clear Storacha space before tests
        run: npm run clear-space

      - name: Run network download tests
        run: npm test -- test/network-download.test.js
        env:
          NODE_OPTIONS: '--experimental-vm-modules --no-warnings'
          DEBUG: 'libp2p:*'

      - name: Clean up test artifacts
        if: always()
        run: npm run clean

  e2e-tests-simple:
    name: E2E Tests (simple-backup-restore)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install example dependencies
        run: npm ci
        working-directory: examples/svelte/simple-backup-restore

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: examples/svelte/simple-backup-restore

      - name: Run E2E tests - simple-backup-restore
        env:
          PORT: 5173
        run: npx playwright test
        working-directory: examples/svelte/simple-backup-restore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-simple-backup-restore
          path: examples/svelte/simple-backup-restore/playwright-report/
          retention-days: 30

  # e2e-tests-orbitdb:
  #   name: E2E Tests (orbitdb-replication)
